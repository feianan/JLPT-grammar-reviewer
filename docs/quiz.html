<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JLPT N2 文法複習 - 翻譯挑戰</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./src/grammar-data.js"></script>
    <script src="./src/compare-pairs.js"></script>
    <script src="./src/shared-state.js"></script>
    <script src="./src/header-nav.js"></script>
    <script>
      let cycles = MemoryState.load();
      let quizState = null;

      initHeaderNav("quiz");
      updateProgress();

      function renderQuiz() {
        const el = document.getElementById("tab-content");
        if (!quizState) {
          el.innerHTML = `
      <div class="card" style="text-align:center;padding:2.5rem 1.5rem">
        <div style="font-size:var(--font-xl);font-weight:700;color:var(--color-text-primary);margin-bottom:.5rem">翻譯挑戰</div>
        <div style="font-size:var(--font-base);color:var(--color-text-secondary);margin-bottom:1.5rem;line-height:var(--line-height-relaxed)">隨機出題：看日文例句選中文意思<br>或看中文意思選正確日文文法</div>
        <button class="btn btn-primary" onclick="startQuiz()" style="padding:var(--space-md) var(--space-2xl);font-size:var(--font-base)">開始測驗</button>
      </div>`;
          return;
        }
        const { q, opts, answered, score, total, mode } = quizState;
        el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
      <span style="font-size:var(--font-base);color:var(--color-text-secondary)">得分 <strong>${score}</strong>／${total}　正確率 ${total ? Math.round((score / total) * 100) : 0}%</span>
      <button class="btn btn-sm" onclick="quizState=null;renderQuiz()">結束</button>
    </div>
    <div class="card">
      <div class="section-label" style="margin-bottom:.75rem">${mode === "zh" ? "這個例句的正確中文意思是？" : "這個中文意思對應的日文文法是？"}</div>
      <div style="font-size:${mode === "zh" ? "var(--font-base)" : "var(--font-xl)"};color:var(--color-text-primary);line-height:var(--line-height-relaxed);margin-bottom:1rem;font-weight:${mode === "zh" ? "400" : "700"}">${esc(mode === "zh" ? q.examples[0]?.jp || q.meaning : q.meaning)}</div>
      <div>
        ${opts
          .map((opt, i) => {
            let cls = "quiz-option";
            if (answered !== null) {
              if (opt.id === q.id) cls += " correct";
              else if (i === answered && opt.id !== q.id) cls += " wrong";
            }
            return `<button class="${cls}" onclick="answerQuiz(${i})" ${answered !== null ? "disabled" : ""}>${esc(mode === "zh" ? opt.meaning : opt.grammar)}</button>`;
          })
          .join("")}
      </div>
      ${
        answered !== null
          ? `
        <div class="result-box">
          ${answered === opts.findIndex((o) => o.id === q.id) ? "✓ 正確！" : "✗ 答錯了。"}<br>
          <strong>${esc(q.grammar)}</strong>　${esc(q.meaning)}<br>
          ${q.examples[0]?.jp ? `<span style="font-size:var(--font-xs);color:var(--color-text-secondary)">${esc(q.examples[0].jp)}　${esc(q.examples[0]?.zh || "")}</span>` : ""}
        </div>
        <button class="btn btn-primary" style="margin-top:1rem" onclick="nextQuiz()">下一題 →</button>
      `
          : ""
      }
    </div>
  `;
      }

      function startQuiz() {
        quizState = {
          q: null,
          opts: [],
          answered: null,
          score: 0,
          total: 0,
          mode: "zh",
        };
        nextQuiz();
      }

      function nextQuiz() {
        const pool = GRAMMAR_DB;
        if (!pool.length) {
          quizState = null;
          renderQuiz();
          return;
        }
        const q = pool[Math.floor(Math.random() * pool.length)];
        const wrong = GRAMMAR_DB.filter((x) => x.id !== q.id)
          .sort(() => Math.random() - 0.5)
          .slice(0, 3);
        const opts = [q, ...wrong].sort(() => Math.random() - 0.5);
        const mode = Math.random() < 0.5 ? "zh" : "jp";
        quizState = { ...quizState, q, opts, answered: null, mode };
        renderQuiz();
      }

      function answerQuiz(i) {
        const right = quizState.opts[i].id === quizState.q.id;
        quizState = {
          ...quizState,
          answered: i,
          score: quizState.score + (right ? 1 : 0),
          total: quizState.total + 1,
        };
        renderQuiz();
      }

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      updateProgress();
      renderQuiz();
    </script>
  </body>
</html>
