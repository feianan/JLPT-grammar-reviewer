<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JLPT N2 文法複習 - 翻譯測試</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./src/grammar-data.js"></script>
    <script src="./src/compare-pairs.js"></script>
    <script src="./src/shared-state.js"></script>
    <script src="./src/header-nav.js"></script>
    <script>
      let cycles = MemoryState.load();
      let quizState = null;

      initHeaderNav("quiz");
      updateProgress();

      function renderQuiz() {
        const el = document.getElementById("tab-content");
        if (!quizState) {
          el.innerHTML = `
      <div class="card start-card">
        <div class="start-title">翻譯測試</div>
        <div class="start-description">隨機出題：看日文例句，選出正確的中文意思</div>
        <button class="btn btn-primary" onclick="startQuiz()">開始測驗</button>
      </div>`;
          return;
        }
        if (quizState.ended) {
          renderReport();
          return;
        }
        const { q, opts, answered, score, total } = quizState;
        const correctIndex = opts.findIndex((o) => o.id === q.id);
        const isCorrect = answered !== null && answered === correctIndex;
        el.innerHTML = `
    <div class="session-header">
      <span>得分 ${score}／${total}　正確率 ${total ? Math.round((score / total) * 100) : 0}%</span>
      <button class="btn" onclick="endQuiz()">結束</button>
    </div>
    <div class="card">
      <div class="section-label">這個例句的正確中文意思是？</div>
      <div class="question-prompt jp">${esc(q.examples[0]?.jp || q.grammar)}</div>
      <div>
        ${opts
          .map((opt, i) => {
            let cls = "answer-option";
            if (answered !== null) {
              if (opt.id === q.id) cls += " correct";
              else if (i === answered && opt.id !== q.id) cls += " wrong";
            }
            return `<button class="${cls}" onclick="answerQuiz(${i})" ${answered !== null ? "disabled" : ""}>${esc(opt.examples[0]?.zh || opt.meaning)}</button>`;
          })
          .join("")}
      </div>
      ${
        answered !== null
          ? `
        <div class="answer-feedback">
          <div class="answer-bar">
            <span class="answer-result-text" style="color:${isCorrect ? "var(--color-success-700)" : "var(--color-error-700)"}">
              ${isCorrect ? "答對ㄌ！好讚" : "答錯了 QQ"}
            </span>
            <button class="btn btn-primary" onclick="nextQuiz()">下一題 →</button>
          </div>
          <div class="answer-detail">
            <div class="detail-grammar">${esc(q.grammar)}</div>
            <div class="meaning">${esc(q.meaning)}</div>
            ${q.examples[0]?.jp ? `<div class="example-jp">${esc(q.examples[0].jp)}</div>` : ""}
            ${q.examples[0]?.zh ? `<div class="example-zh">${esc(q.examples[0].zh)}</div>` : ""}
            ${q.supplement ? `<div class="supplement">${esc(q.supplement)}</div>` : ""}
            ${q.url ? `<div style="margin-top:var(--space-xl)"><a href="${q.url}" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">參考資料</a></div>` : ""}
          </div>
        </div>
      `
          : ""
      }
    </div>
  `;
      }

      function startQuiz() {
        quizState = {
          q: null,
          opts: [],
          answered: null,
          score: 0,
          total: 0,
          history: [],
          ended: false,
        };
        nextQuiz();
      }

      function endQuiz() {
        quizState = { ...quizState, ended: true };
        renderQuiz();
      }

      function renderReport() {
        const { history, score, total } = quizState;
        const el = document.getElementById("tab-content");
        el.innerHTML = `
    <div class="session-header">
      <span>得分 <strong>${score}</strong>／${total}　正確率 ${total ? Math.round((score / total) * 100) : 0}%</span>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="grammar-list">
        ${[...history]
          .sort((a, b) => a.correct - b.correct)
          .map(
            ({ q, correct }) => `
          <div class="grammar-item">
            <div>
              <div class="grammar-item-name">${esc(q.grammar)}</div>
              <div class="grammar-item-meaning">${esc(q.meaning)}</div>
            </div>
            <span class="result-badge ${correct ? "correct" : "wrong"}">${correct ? "答對" : "答錯"}</span>
          </div>
        `,
          )
          .join("")}
      </div>
    </div>
    <div style="text-align:center;margin-top:1rem">
      <button class="btn btn-primary" onclick="startQuiz()">開始新測試</button>
    </div>
  `;
      }

      function nextQuiz() {
        if (!GRAMMAR_DB.length) {
          quizState = null;
          renderQuiz();
          return;
        }
        const q = GRAMMAR_DB[Math.floor(Math.random() * GRAMMAR_DB.length)];
        const wrong = GRAMMAR_DB.filter((x) => x.id !== q.id)
          .sort(() => Math.random() - 0.5)
          .slice(0, 3);
        const opts = [q, ...wrong].sort(() => Math.random() - 0.5);
        quizState = { ...quizState, q, opts, answered: null };
        renderQuiz();
      }

      function answerQuiz(i) {
        const right = quizState.opts[i].id === quizState.q.id;
        quizState = {
          ...quizState,
          answered: i,
          score: quizState.score + (right ? 1 : 0),
          total: quizState.total + 1,
          history: [...quizState.history, { q: quizState.q, correct: right }],
        };
        renderQuiz();
      }

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      updateProgress();
      renderQuiz();
    </script>
  </body>
</html>
