<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JLPT N2 文法複習 - 瀏覽</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./src/grammar-data.js"></script>
    <script src="./src/compare-pairs.js"></script>
    <script src="./src/shared-state.js"></script>
    <script src="./src/header-nav.js"></script>
    <script>
      const PAGE_SIZE = 30;
      let cycles = MemoryState.load();
      let searchQ = "";
      let sortBy = "kana_asc"; // kana_asc, kana_desc, cycle_asc, cycle_desc
      let browseOffset = 0;
      let activeDetail = null;

      initHeaderNav("browse");
      updateProgress();

      function saveCycles() {
        MemoryState.save(cycles);
      }

      function getFiltered() {
        let filtered = GRAMMAR_DB.filter((g) => {
          const q = searchQ.toLowerCase();
          const matchQ =
            !q ||
            g.grammar.includes(q) ||
            g.meaning.includes(q) ||
            (g.examples[0]?.zh || "").includes(q);
          return matchQ;
        });

        // Sort
        if (sortBy === "kana_asc") {
          filtered.sort((a, b) => a.grammar.localeCompare(b.grammar, "ja"));
        } else if (sortBy === "kana_desc") {
          filtered.sort((a, b) => b.grammar.localeCompare(a.grammar, "ja"));
        } else if (sortBy === "cycle_asc") {
          filtered.sort(
            (a, b) =>
              MemoryState.getCycle(a.id, cycles) -
              MemoryState.getCycle(b.id, cycles),
          );
        } else if (sortBy === "cycle_desc") {
          filtered.sort(
            (a, b) =>
              MemoryState.getCycle(b.id, cycles) -
              MemoryState.getCycle(a.id, cycles),
          );
        }

        return filtered;
      }

      function renderBrowse() {
        if (activeDetail) {
          showDetail(activeDetail);
          return;
        }
        // Only build the shell (search bar + controls) if not already present
        if (!document.getElementById("browse-list")) {
          document.getElementById("tab-content").innerHTML = `
    <div class="search-wrap">
      <input id="browse-search" class="search-box" placeholder="搜尋文法、中文意思..."
        oninput="searchQ=this.value;browseOffset=0;renderList()">
      <button id="browse-clear" class="search-clear" style="display:none"
        onclick="searchQ='';browseOffset=0;document.getElementById('browse-search').value='';renderList()">✕</button>
    </div>
    <div class="filter-row">
      <div class="sort-tabs" id="browse-sort-tabs">
        <button class="sort-tab" data-sort="kana_asc" onclick="sortBy='kana_asc';browseOffset=0;renderList()">日文字母 ↑</button>
        <button class="sort-tab" data-sort="kana_desc" onclick="sortBy='kana_desc';browseOffset=0;renderList()">日文字母 ↓</button>
        <button class="sort-tab" data-sort="cycle_asc" onclick="sortBy='cycle_asc';browseOffset=0;renderList()">週期 ↑</button>
        <button class="sort-tab" data-sort="cycle_desc" onclick="sortBy='cycle_desc';browseOffset=0;renderList()">週期 ↓</button>
      </div>
      <span id="browse-count" class="filter-count"></span>
    </div>
    <div id="browse-list"></div>
  `;
          document.getElementById("browse-search").value = searchQ;
        }
        renderList();
      }

      function renderList() {
        const filtered = getFiltered();
        const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
        const page = Math.floor(browseOffset / PAGE_SIZE);
        const slice = filtered.slice(browseOffset, browseOffset + PAGE_SIZE);

        document.getElementById("browse-count").textContent =
          `共 ${filtered.length} 個文法`;
        document
          .querySelectorAll("#browse-sort-tabs .sort-tab")
          .forEach((btn) => {
            btn.classList.toggle("active", btn.dataset.sort === sortBy);
          });
        const clearBtn = document.getElementById("browse-clear");
        if (clearBtn) clearBtn.style.display = searchQ ? "" : "none";

        document.getElementById("browse-list").innerHTML = `
    <div class="card" style="padding:0;overflow:hidden">
      <div class="grammar-list">
        ${slice
          .map((g) => {
            const cycle = MemoryState.getCycle(g.id, cycles);
            return `
          <div class="grammar-item" onclick="activeDetail=${g.id};renderBrowse()">
            <div>
              <div class="grammar-item-name">${esc(g.grammar)}</div>
              <div class="grammar-item-meaning">${esc(g.meaning)}</div>
            </div>
            ${cycle > 0 ? `<span class="mem-badge">週期 ${cycle}</span>` : ""}
          </div>`;
          })
          .join("")}
      </div>
    </div>
    ${totalPages > 1 ? renderPager(page, totalPages, filtered.length) : ""}
  `;
      }

      function renderPager(page, total, count) {
        const start = page * PAGE_SIZE + 1;
        const end = Math.min((page + 1) * PAGE_SIZE, count);
        let btns = "";
        for (let i = 0; i < total; i++) {
          btns += `<button class="pager-btn ${i === page ? "active" : ""}" onclick="browseOffset=${i * PAGE_SIZE};renderBrowse()">${i + 1}</button>`;
        }
        return `<div class="pager"><span class="pager-info">${start}–${end} / ${count}</span>${btns}</div>`;
      }

      function showDetail(id) {
        const g = GRAMMAR_DB.find((x) => x.id === id);
        if (!g) return;
        const cycle = MemoryState.getCycle(id, cycles);
        document.getElementById("tab-content").innerHTML = `
    <button class="btn btn-ghost" onclick="activeDetail=null;renderBrowse()">← 返回列表</button>
    <div class="card" style="margin-top:.75rem">
      <div class="section-label">文法</div>
      <div class="grammar-title">${esc(g.grammar)}</div>
      <div class="meaning">${esc(g.meaning)}</div>
      <div class="tags">${g.prefix.map((p) => `<span class="tag">${esc(p)}</span>`).join("")}</div>
      ${g.supplement ? `<div class="supplement">${esc(g.supplement)}</div>` : ""}
      ${g.page ? `<div style="margin-top:.75rem;font-size:var(--font-xs);color:var(--color-text-muted)">文法比較辭典 p.${g.page}</div>` : ""}
    </div>
    <div class="card">
      <div class="section-label">例句</div>
      <div class="example-jp">${esc(g.examples[0]?.jp || "")}</div>
      ${g.examples[0]?.zh ? `<div class="example-zh">${esc(g.examples[0].zh)}</div>` : ""}
    </div>
    ${cycle > 0 ? `<div style="margin-top:1rem;font-size:var(--font-base);color:var(--color-text-secondary)">目前週期：<strong style="color:var(--color-primary-500)">${cycle}</strong></div>` : ""}
  `;
      }

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      updateProgress();
      renderBrowse();
    </script>
  </body>
</html>
