<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JLPT N2 文法複習 - 文法測試</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./src/grammar-data.js"></script>
    <script src="./src/compare-pairs.js"></script>
    <script src="./src/shared-state.js"></script>
    <script src="./src/header-nav.js"></script>
    <script>
      let cycles = MemoryState.load();
      let fcState = null;

      initHeaderNav("flashcard");
      updateProgress();

      function saveCycles() {
        MemoryState.save(cycles);
      }

      function shuffleArray(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function renderFlashcard() {
        const el = document.getElementById("tab-content");
        if (!fcState) {
          el.innerHTML = `
      <div class="card start-card">
        <div class="start-title">單字卡練習</div>
        <div class="start-description">看文法，選出正確的中文意思</div>
        <button class="btn btn-primary" onclick="startFc()">開始測驗</button>
      </div>`;
          return;
        }
        if (fcState.ended) {
          renderFcReport();
          return;
        }

        const {
          pool,
          index,
          score,
          total,
          answered,
          currentOptions,
          isCorrect,
          selectedIndex,
        } = fcState;
        const g = pool[index];

        el.innerHTML = `
    <div class="session-header">
      <span>得分 <strong>${score}</strong>／${total}　正確率 ${total ? Math.round((score / total) * 100) : 0}%</span>
      <button class="btn" onclick="endFc()">結束</button>
    </div>
    <div class="question-card">
      <div class="section-label">這個文法的意思是？</div>
      <div class="question-grammar">${esc(g.grammar)}</div>
      <div class="tags">${g.prefix.map((p) => `<span class="tag">${esc(p)}</span>`).join("")}</div>
      <div class="question-options">
        ${currentOptions
          .map((opt, i) => {
            let cls = "answer-option";
            if (answered) {
              if (opt.correct) cls += " correct";
              else if (i === selectedIndex) cls += " wrong";
            }
            return `<button class="${cls}" onclick="selectOption(${i})" ${answered ? "disabled" : ""}>${esc(opt.grammar.meaning)}</button>`;
          })
          .join("")}
        ${
          answered
            ? `
          <div class="answer-feedback">
            <div class="answer-bar">
              <span class="answer-result-text" style="color:${isCorrect ? "var(--color-success-700)" : "var(--color-error-700)"}">
                ${isCorrect ? "答對了！" : "答錯了"}
              </span>
              <button class="btn btn-primary" onclick="fcNext()">下一題 →</button>
            </div>
            <div class="answer-detail">
              <div class="detail-grammar">${esc(g.grammar)}</div>
              <div class="meaning">${esc(g.meaning)}</div>
              ${g.examples[0]?.jp ? `<div class="example-jp">${esc(g.examples[0].jp)}</div>` : ""}
              ${g.examples[0]?.zh ? `<div class="example-zh">${esc(g.examples[0].zh)}</div>` : ""}
              ${g.supplement ? `<div class="supplement">${esc(g.supplement)}</div>` : ""}
              ${g.url ? `<div style="margin-top:var(--space-xl)"><a href="${g.url}" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">參考資料</a></div>` : ""}
            </div>
          </div>
        `
            : ""
        }
      </div>
    </div>
  `;
      }

      function startFc() {
        const pool = shuffleArray(
          MemoryState.getLowestCycleItems(GRAMMAR_DB, cycles),
        );
        if (!pool.length) return;
        fcState = {
          pool,
          index: 0,
          score: 0,
          total: 0,
          history: [],
          answered: false,
          isCorrect: false,
          selectedIndex: null,
          ended: false,
          currentOptions: [],
        };
        prepareQuestion();
      }

      function prepareQuestion() {
        if (fcState.index >= fcState.pool.length) {
          fcState = { ...fcState, ended: true };
          renderFlashcard();
          return;
        }
        const g = fcState.pool[fcState.index];
        const wrong = shuffleArray(
          GRAMMAR_DB.filter((x) => x.id !== g.id),
        ).slice(0, 2);
        const currentOptions = shuffleArray([
          { grammar: g, correct: true },
          { grammar: wrong[0], correct: false },
          { grammar: wrong[1], correct: false },
        ]);
        fcState = {
          ...fcState,
          answered: false,
          isCorrect: false,
          selectedIndex: null,
          currentOptions,
        };
        renderFlashcard();
      }

      function selectOption(optIndex) {
        if (fcState.answered) return;
        const { currentOptions, pool, index } = fcState;
        const isCorrect = currentOptions[optIndex].correct;
        if (isCorrect) {
          cycles = MemoryState.incrementCycle(pool[index].id, cycles);
          saveCycles();
          updateProgress();
        }
        fcState = {
          ...fcState,
          answered: true,
          isCorrect,
          selectedIndex: optIndex,
          score: fcState.score + (isCorrect ? 1 : 0),
          total: fcState.total + 1,
          history: [...fcState.history, { q: pool[index], correct: isCorrect }],
        };
        renderFlashcard();
      }

      function fcNext() {
        fcState = { ...fcState, index: fcState.index + 1 };
        prepareQuestion();
      }

      function endFc() {
        fcState = { ...fcState, ended: true };
        renderFlashcard();
      }

      function renderFcReport() {
        const { history, score, total } = fcState;
        document.getElementById("tab-content").innerHTML = `
    <div class="session-header">
      <span>得分 <strong>${score}</strong>／${total}　正確率 ${total ? Math.round((score / total) * 100) : 0}%</span>
    </div>
    <div class="card" style="padding:0;overflow:hidden">
      <div class="grammar-list">
        ${[...history]
          .sort((a, b) => a.correct - b.correct)
          .map(
            ({ q, correct }) => `
          <div class="grammar-item">
            <div>
              <div class="grammar-item-name">${esc(q.grammar)}</div>
              <div class="grammar-item-meaning">${esc(q.meaning)}</div>
            </div>
            <span class="result-badge ${correct ? "correct" : "wrong"}">${correct ? "答對" : "答錯"}</span>
          </div>
        `,
          )
          .join("")}
      </div>
    </div>
    <div style="text-align:center;margin-top:1rem">
      <button class="btn btn-primary" onclick="startFc()">開始新測試</button>
    </div>
  `;
      }

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      updateProgress();
      renderFlashcard();
    </script>
  </body>
</html>
