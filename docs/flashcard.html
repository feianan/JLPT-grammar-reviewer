<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JLPT N2 文法複習 - 單字卡</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script src="./src/grammar-data.js"></script>
    <script src="./src/compare-pairs.js"></script>
    <script src="./src/shared-state.js"></script>
    <script src="./src/header-nav.js"></script>
    <script>
      let cycles = MemoryState.load();
      let fcIndex = 0;
      let fcPool = [];
      let currentLowestCycle = 0;
      let fcAnswered = false;
      let fcCurrentOptions = []; // [{ grammar, correct }, ...]

      initHeaderNav("flashcard");
      updateProgress();

      function saveCycles() {
        MemoryState.save(cycles);
      }

      function shuffleArray(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      function renderFlashcard(reshuffle = false) {
        const lowestCycleItems = MemoryState.getLowestCycleItems(
          GRAMMAR_DB,
          cycles,
        );

        if (reshuffle || fcPool.length !== lowestCycleItems.length) {
          fcPool = shuffleArray(lowestCycleItems);
          fcIndex = 0;
          currentLowestCycle =
            lowestCycleItems.length > 0
              ? MemoryState.getCycle(lowestCycleItems[0].id, cycles)
              : 0;
        }

        if (fcIndex >= fcPool.length) {
          fcPool = shuffleArray(
            MemoryState.getLowestCycleItems(GRAMMAR_DB, cycles),
          );
          fcIndex = 0;
          currentLowestCycle =
            fcPool.length > 0 ? MemoryState.getCycle(fcPool[0].id, cycles) : 0;
        }

        const pool = fcPool;
        const g = pool[fcIndex];
        fcAnswered = false;

        const wrongItems = shuffleArray(
          GRAMMAR_DB.filter((x) => x.id !== g.id),
        ).slice(0, 2);
        fcCurrentOptions = shuffleArray([
          { grammar: g, correct: true },
          { grammar: wrongItems[0], correct: false },
          { grammar: wrongItems[1], correct: false },
        ]);

        const optionsHtml = fcCurrentOptions
          .map(
            (opt, i) =>
              `<button class="quiz-option" id="fc-opt-${i}" data-correct="${opt.correct}" data-gid="${opt.grammar.id}" onclick="selectOption(${g.id}, ${opt.correct}, ${i})">${esc(opt.grammar.meaning)}</button>`,
          )
          .join("");

        document.getElementById("tab-content").innerHTML = `
    <div class="fc-card">
      <div class="section-label" style="margin-bottom:.5rem">這個文法的意思是？</div>
      <div style="font-size:var(--font-3xl);font-weight:700;color:var(--color-text-primary);margin:1rem 0">${esc(g.grammar)}</div>
      <div class="tags" style="justify-content:center">${g.prefix.map((p) => `<span class="tag">${esc(p)}</span>`).join("")}</div>
      <div style="width:100%;margin-top:1.5rem">
        ${optionsHtml}
        <div id="fc-feedback" style="display:none;margin-top:1rem">
          <div id="fc-result-box" style="border-radius:12px;border:1px solid var(--color-border);background:var(--color-neutral-50);padding:1.5rem 1.75rem 2rem">
            <div style="margin-bottom:1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--color-border)">
              <span id="fc-result-text" style="font-size:var(--font-base);font-weight:700"></span>
            </div>
            <div id="fc-detail"></div>
          </div>
          <div id="fc-next-hint" style="text-align:center;margin-top:1.5rem;font-size:var(--font-xs);color:var(--color-text-muted)"></div>
          <div id="fc-next-btn" style="display:none;text-align:center;margin-top:1.5rem">
            <button class="btn btn-primary" onclick="fcNext()">下一題</button>
          </div>
        </div>
      </div>
    </div>
    <div style="text-align:center;margin-top:.75rem;font-size:var(--font-xs);color:var(--color-text-muted)">${fcIndex + 1} / ${pool.length}（隨機順序）</div>
  `;
      }

      function renderDetail(g) {
        return `
          <div class="meaning" style="margin-bottom:var(--space-xl)">${esc(g.meaning)}</div>
          <div class="example-jp">${esc(g.examples[0]?.jp || "")}</div>
          ${g.examples[0]?.zh ? `<div class="example-zh">${esc(g.examples[0].zh)}</div>` : ""}
          ${g.supplement ? `<div class="supplement">${esc(g.supplement)}</div>` : ""}
          ${g.url ? `<div style="margin-top:var(--space-xl)"><a href="${g.url}" target="_blank" rel="noopener noreferrer" class="btn btn-secondary">參考資料</a></div>` : ""}
        `;
      }

      function showDetail(gid) {
        const g = GRAMMAR_DB.find((x) => x.id === gid);
        if (!g) return;
        document.getElementById("fc-detail").innerHTML = renderDetail(g);
        // Highlight the active detail tab
        for (let i = 0; i < 3; i++) {
          const btn = document.getElementById(`fc-opt-${i}`);
          if (!btn) continue;
          btn.style.outline =
            Number(btn.dataset.gid) === gid
              ? "2px solid var(--color-neutral-400)"
              : "none";
        }
      }

      function selectOption(id, isCorrect, optIndex) {
        if (fcAnswered) return;
        fcAnswered = true;

        // Apply correct/wrong styles and re-wire clicks to showDetail
        for (let i = 0; i < 3; i++) {
          const btn = document.getElementById(`fc-opt-${i}`);
          if (!btn) continue;
          const gid = Number(btn.dataset.gid);
          btn.onclick = () => showDetail(gid);
          if (btn.dataset.correct === "true") btn.classList.add("correct");
        }
        const selectedBtn = document.getElementById(`fc-opt-${optIndex}`);
        if (selectedBtn && !isCorrect) selectedBtn.classList.add("wrong");

        if (isCorrect) {
          cycles = MemoryState.incrementCycle(id, cycles);
          saveCycles();
          updateProgress();
        }

        const resultText = document.getElementById("fc-result-text");
        const feedback = document.getElementById("fc-feedback");
        const nextHint = document.getElementById("fc-next-hint");
        if (resultText) {
          resultText.textContent = isCorrect ? "答對了！週期 +1" : "答錯了";
          resultText.style.color = isCorrect
            ? "var(--color-success-700)"
            : "var(--color-error-700)";
        }
        if (feedback) feedback.style.display = "block";

        // Default: show the correct option's detail
        const correctOption = fcCurrentOptions.find((o) => o.correct);
        if (correctOption) showDetail(correctOption.grammar.id);

        if (!isCorrect) {
          const nextBtn = document.getElementById("fc-next-btn");
          if (nextBtn) nextBtn.style.display = "block";
        }

        if (isCorrect) {
          let remaining = 3;
          if (nextHint) nextHint.textContent = `${remaining} 秒後自動前進…`;
          const timer = setInterval(() => {
            remaining--;
            if (remaining > 0) {
              if (nextHint) nextHint.textContent = `${remaining} 秒後自動前進…`;
            } else {
              clearInterval(timer);
              fcNext();
            }
          }, 1000);
        }
      }

      function fcNext() {
        fcIndex++;
        renderFlashcard();
      }

      function esc(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      updateProgress();
      renderFlashcard(true);
    </script>
  </body>
</html>
